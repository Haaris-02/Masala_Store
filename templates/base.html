<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Masala Store{% endblock %}</title>
    
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Font Awesome for Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            --brand-red: #8B261D;      /* Deep earthy red for branding */
            --brand-orange: #C05725;   /* Warm spice orange for accents/badges */
            --brand-offwhite: #F8F5F0; /* Clean off-white for the background */
            --brand-dark: #3E2723;     /* Dark brown for text and footer */
        }
        
        body {
            background-color: var(--brand-offwhite);
            color: var(--brand-dark);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }
        
        .navbar {
            background-color: var(--brand-red);
        }
        
        .navbar-brand, .nav-link {
            color: var(--brand-offwhite) !important;
            transition: color 0.3s ease;
        }
        
        .nav-link:hover {
            color: var(--brand-orange) !important;
        }
        
        .cart-badge {
            background-color: var(--brand-orange);
            color: white;
        }
        
        main {
            flex: 1; /* Pushes the footer to the bottom */
        }
        
        footer {
            background-color: var(--brand-dark);
            color: var(--brand-offwhite);
        }
    </style>
</head>
<body>

    <!-- Sticky Navbar -->
    <nav class="navbar navbar-expand-lg sticky-top shadow-sm">
        <div class="container">
            <a class="navbar-brand fw-bold fs-4" href="{% url 'home' %}">
                <i class="fas fa-pepper-hot me-2 text-warning"></i>Masala Store
            </a>
            <button class="navbar-toggler border-0" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav" aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
                <span class="navbar-toggler-icon" style="filter: invert(1);"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav me-auto mb-2 mb-lg-0">
                    <li class="nav-item"><a class="nav-link px-3" href="{% url 'home' %}">Home</a></li>
                    <li class="nav-item"><a class="nav-link px-3" href="{% url 'products' %}">Products</a></li>
                    <li class="nav-item"><a class="nav-link px-3" href="{% url 'about' %}">About</a></li>
                    <li class="nav-item"><a class="nav-link px-3" href="{% url 'contact' %}">Contact</a></li>
                </ul>
                <!-- Cart Icon with Badge -->
                <a href="{% url 'checkout' %}" class="nav-link position-relative px-2">
                    <i class="fas fa-shopping-cart fs-5"></i>
                    <span class="position-absolute top-0 start-100 translate-middle badge rounded-pill cart-badge">
                        {{ request.session.cart_count|default:0 }}
                    </span>
                </a>
            </div>
        </div>
    </nav>

    <!-- Main Content Area -->
    <main class="container my-5">
        {% block content %}
        <!-- Page specific content goes here -->
        {% endblock %}
    </main>

    <!-- Footer -->
    <footer class="py-4 mt-auto">
        <div class="container text-center">
            <p class="mb-0">&copy; {% now "Y" %} Masala Store (Kudusai Thozhil). All Rights Reserved.</p>
            <small class="text-white-50">Authentic homemade spices delivered to your kitchen.</small>
        </div>
    </footer>

    <!-- Bootstrap 5 JS Bundle -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
