{% extends 'base.html' %}

{% block title %}Contact Us - Masala Store{% endblock %}

{% block content %}
<div class="container my-5">
    <h1 class="text-center mb-5 fw-bold" style="color: var(--brand-dark);">Contact Us</h1>

    <div class="row justify-content-center">
        <div class="col-md-8 col-lg-6">
            <div class="card shadow-sm rounded-3 p-4">
                <div class="card-body">
                    <p class="text-center mb-4">Have a question or feedback? We'd love to hear from you!</p>
                    <form method="POST">
                        {% csrf_token %}
                        <div class="mb-3">
                            <label for="id_name" class="form-label">Name</label>
                            <input type="text" class="form-control" id="id_name" name="name">
                        </div>
                        <div class="mb-3">
                            <label for="id_email" class="form-label">Email address</label>
                            <input type="email" class="form-control" id="id_email" name="email">
                        </div>
                        <div class="mb-3">
                            <label for="id_message" class="form-label">Message</label>
                            <textarea class="form-control" id="id_message" name="message" rows="5"></textarea>
                        </div>
                        <div class="d-grid">
                            <button type="submit" class="btn btn-lg" style="background-color: var(--brand-red); color: white;">Send Message</button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
