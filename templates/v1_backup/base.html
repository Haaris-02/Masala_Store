<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Kudusai Thozhil{% endblock %}</title>
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <style>
        :root {
            --brand-maroon: #800000;
            --brand-brown: #8B4513;
            --brand-orange: #D2691E;
            --bg-light: #FFF8DC;
        }
        body {
            background-color: var(--bg-light);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        .navbar {
            background-color: var(--brand-maroon) !important;
        }
        .navbar-brand {
            color: #fff !important;
            letter-spacing: 1px;
        }
        .nav-link {
            color: rgba(255, 255, 255, 0.85) !important;
            font-weight: 500;
        }
        .nav-link:hover {
            color: var(--brand-orange) !important;
        }
        .btn-brand {
            background-color: var(--brand-orange);
            color: white;
            border: none;
            transition: all 0.3s ease;
        }
        .btn-brand:hover {
            background-color: var(--brand-brown);
            color: white;
            transform: scale(1.05);
        }
        .product-card {
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }
        .product-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 20px rgba(0,0,0,0.15) !important;
        }
        /* Cart Hover Dropdown */
        .cart-dropdown:hover .dropdown-menu {
            display: block;
            margin-top: 0;
        }
        .cart-dropdown .dropdown-menu {
            animation: fadeIn 0.3s ease;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .cart-dropdown-menu {
            width: 300px;
            position: absolute;
            right: 0;
            left: auto;
        }
        .cart-header {
            color: var(--brand-maroon);
        }
    </style>
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark shadow-sm">
        <div class="container">
            <a class="navbar-brand fw-bold fs-4" href="/">Kudusai Thozhil</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav" aria-label="Toggle navigation" title="Toggle navigation">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item"><a class="nav-link" href="{% url 'home' %}">Home</a></li>
                    <li class="nav-item"><a class="nav-link" href="{% url 'products' %}">Products</a></li>
                    <li class="nav-item"><a class="nav-link" href="{% url 'about' %}">About Us</a></li>
                    <li class="nav-item"><a class="nav-link" href="{% url 'contact' %}">Contact</a></li>
                </ul>
                <ul class="navbar-nav ms-2">
                    <li class="nav-item dropdown cart-dropdown">
                        <a class="nav-link" href="#" id="cartDropdown">
                            <i class="bi bi-cart3 fs-5"></i><span id="cart-count" class="badge bg-danger rounded-pill ms-1">0</span>
                        </a>
                        <div class="dropdown-menu dropdown-menu-end shadow border-0 p-3 cart-dropdown-menu" aria-labelledby="cartDropdown">
                            <h6 class="dropdown-header px-0 text-brand-maroon fw-bold border-bottom mb-2 cart-header">Your Cart</h6>
                            <div id="cart-items-container">
                                <p class="text-muted small mb-0 text-center">Your cart is empty.</p>
                            </div>
                            <div class="mt-3 text-center d-none" id="cart-checkout-btn">
                                <a href="#" class="btn btn-brand btn-sm w-100 rounded-pill py-2">View Cart / Checkout</a>
                            </div>
                        </div>
                    </li>
                </ul>
            </div>
        </div>
    </nav>
    {% block content %}{% endblock %}
    <!-- Bootstrap 5 JS Bundle -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        let cartCount = 0;
        let cartItems = {};

        function addToCart(productName) {
            cartCount++;
            document.getElementById('cart-count').innerText = cartCount;
            
            if (cartItems[productName]) {
                cartItems[productName]++;
            } else {
                cartItems[productName] = 1;
            }
            
            updateCartUI();
            alert(productName + " has been added to your cart!");
        }

        function updateCartUI() {
            const container = document.getElementById('cart-items-container');
            const checkoutBtn = document.getElementById('cart-checkout-btn');
            
            let html = '<ul class="list-unstyled mb-0">';
            for (const [name, qty] of Object.entries(cartItems)) {
                html += `<li class="d-flex justify-content-between align-items-center mb-2 pb-2 border-bottom">
                            <span class="small fw-medium text-truncate" style="max-width: 200px;">${name}</span>
                            <span class="badge bg-secondary rounded-pill">x${qty}</span>
                         </li>`;
            }
            html += '</ul>';
            
            container.innerHTML = html;
            checkoutBtn.classList.remove('d-none');
        }
    </script>
</body>
</html>
